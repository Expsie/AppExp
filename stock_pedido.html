<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de stock y pedidos - Supabase</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { text-align: center; }
        .section { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { padding: 6px; margin-bottom: 10px; width: 100%; max-width: 420px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        tbody tr:nth-child(odd) { background-color: #fafafa; }
        button { margin-right: 5px; margin-bottom: 5px; padding: 8px 12px; font-size: 1em; }
        code { background: #f5f5f5; padding: 2px 4px; border-radius: 4px; }
        .line-row input { width: 100%; box-sizing: border-box; }
        .status { display: inline-block; margin-left: 8px; font-weight: bold; }
        .muted { color: #666; font-size: 0.95em; }
        .error { color: #a40000; }
        .ok { color: #0a6b12; }
    </style>
</head>
<body>
    <h1>Gestor de stock y pedidos</h1>

    <div class="section" id="supabase-section">
        <h2>Conexión con Supabase</h2>
        <p class="muted">Conexión configurada. Esta pantalla solo permite crear pedidos; la actualización/importación manual de stock está en <code>ver_pedidos.html</code>.</p>
        <div>
            <button type="button" id="refresh-data-btn">Actualizar ahora</button>
            <span id="supabase-status" class="status"></span>
        </div>
    </div>

    <div class="section" id="pedido-section">
        <h2>Crear pedido de stock</h2>
        <div>
            <label for="ldap">LDAP solicitante</label>
            <input type="text" id="ldap" required placeholder="LDAP del solicitante" />
        </div>
        <div>
            <label for="tienda">Tienda</label>
            <select id="tienda" required>
                <option value="">Seleccione una tienda</option>
                <option value="T038">T038</option>
                <option value="T006">T006</option>
            </select>
        </div>
        <div>
            <label for="cc">CC asociado</label>
            <input type="text" id="cc" required placeholder="Centro de coste" />
        </div>
        <div>
            <label for="circuito">Circuito</label>
            <select id="circuito" required>
                <option value="">Seleccione un circuito</option>
                <option value="Transporte">Transporte</option>
                <option value="Retirada en Tienda">Retirada en Tienda</option>
                <option value="Retirada en LLS Palma">Retirada en LLS Palma</option>
            </select>
        </div>
        <button type="button" id="add-line-btn">Añadir línea</button>
        <button type="button" id="finalize-btn">Finalizar pedido</button>
        <button type="button" id="view-orders-btn">Ver pedidos guardados</button>
        <table id="lines-table">
            <thead>
                <tr>
                    <th>Referencia</th>
                    <th>Designación</th>
                    <th>Sección</th>
                    <th>Cant. solicitada</th>
                    <th>Cant. disponible</th>
                    <th>Ubicaciones</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script>
        const SUPABASE_CONFIG = {
            restUrl: 'https://xuksvnotvestdgchgppg.supabase.co/rest/v1',
            anonKeyParts: ['sb_publishable_', '6cYXev16SOZ4TyT9UYuDHQ_JEtuV5G5'],
            stockTable: 'StockDispo',
            pedidosTable: 'PedidoMutuOfline'
        };

        const REFRESH_INTERVAL_MS = 180000; // 3 minutos

        let stockCache = [];
        let pedidosCache = [];
        let activeStockColumnMap = null;
        let activePedidoColumnMap = null;

        // Supabase/PostgreSQL distingue nombres como fecha y "Fecha".
        // Probamos varios mapas para adaptarnos a tablas creadas con mayúsculas o minúsculas.
        const STOCK_COLUMN_MAPPINGS = [
            {
                name: 'stock: StockDispo real Supabase',
                id: 'id',
                referencia: 'Product Code',
                designacion: 'Product name',
                seccion: 'Department',
                stockDisponible: 'Qty',
                ubicaciones: 'Address',
                tienda: 'Tienda',
                sscc: 'SSCC',
                ean: 'EAN code'
            },
            {
                name: 'stock: mayúscula inicial',
                id: 'id',
                referencia: 'Referencia',
                designacion: 'Designacion',
                seccion: 'Seccion',
                stockDisponible: 'StockDisponible',
                ubicaciones: 'Ubicaciones',
                tienda: 'Tienda'
            },
            {
                name: 'stock: mayúscula inicial con acentos',
                id: 'id',
                referencia: 'Referencia',
                designacion: 'Designación',
                seccion: 'Sección',
                stockDisponible: 'StockDisponible',
                ubicaciones: 'Ubicaciones',
                tienda: 'Tienda'
            },
            {
                name: 'stock: minúsculas/camelCase',
                id: 'id',
                referencia: 'referencia',
                designacion: 'designacion',
                seccion: 'seccion',
                stockDisponible: 'stockDisponible',
                ubicaciones: 'ubicaciones',
                tienda: 'tienda'
            }
        ];

        const PEDIDO_COLUMN_MAPPINGS = [
            {
                name: 'pedidos: minúsculas + Fecha',
                id: 'id',
                ldap: 'ldap',
                tienda: 'tienda',
                cc: 'cc',
                circuito: 'circuito',
                fecha: 'Fecha',
                lineas: 'lineas',
                impreso: 'impreso',
                preparado: 'preparado'
            },
            {
                name: 'pedidos: mayúscula inicial',
                id: 'id',
                ldap: 'LDAP',
                tienda: 'Tienda',
                cc: 'CC',
                circuito: 'Circuito',
                fecha: 'Fecha',
                lineas: 'Lineas',
                impreso: 'Impreso',
                preparado: 'Preparado'
            },
            {
                name: 'pedidos: cabecera en mayúsculas y líneas minúscula',
                id: 'id',
                ldap: 'LDAP',
                tienda: 'Tienda',
                cc: 'CC',
                circuito: 'Circuito',
                fecha: 'Fecha',
                lineas: 'lineas',
                impreso: 'Impreso',
                preparado: 'Preparado'
            }
        ];

        function getConfiguredAnonKey() {
            return SUPABASE_CONFIG.anonKeyParts.join('');
        }

        function supabaseHeaders(extraHeaders = {}) {
            const key = getConfiguredAnonKey();
            if (!key) {
                throw new Error('Falta configurar la publishable key de Supabase.');
            }
            return {
                apikey: key,
                Authorization: `Bearer ${key}`,
                ...extraHeaders
            };
        }

        function tableUrl(tableName, query = '') {
            const base = `${SUPABASE_CONFIG.restUrl.replace(/\/$/, '')}/${encodeURIComponent(tableName)}`;
            return query ? `${base}?${query}` : base;
        }

        async function supabaseRequest(tableName, { method = 'GET', query = '', body = null, headers = {} } = {}) {
            const requestHeaders = supabaseHeaders(headers);
            const options = { method, headers: requestHeaders };
            if (body !== null) {
                options.body = JSON.stringify(body);
                if (!options.headers['Content-Type']) options.headers['Content-Type'] = 'application/json';
            }
            const response = await fetch(tableUrl(tableName, query), options);
            const responseText = await response.text();
            if (!response.ok) {
                throw new Error(`${method} ${tableName} falló (${response.status}): ${responseText || response.statusText}`);
            }
            if (!responseText) return null;
            try {
                return JSON.parse(responseText);
            } catch (error) {
                return responseText;
            }
        }

        async function findExistingColumn(tableName, candidates) {
            const uniqueCandidates = [...new Set(candidates.filter(Boolean))];
            const errors = [];
            for (const column of uniqueCandidates) {
                try {
                    await supabaseRequest(tableName, { query: `select=${encodeURIComponent(column)}&limit=1` });
                    return column;
                } catch (error) {
                    errors.push(`${column}: ${error.message}`);
                }
            }
            return { column: null, errors };
        }

        function setStatus(message, ok = true) {
            const el = document.getElementById('supabase-status');
            el.textContent = message;
            el.className = `status ${ok ? 'ok' : 'error'}`;
        }

        function pick(obj, keys, fallback = '') {
            for (const key of keys) {
                if (obj && obj[key] !== undefined && obj[key] !== null) return obj[key];
            }
            return fallback;
        }

        function toText(value) {
            return value === undefined || value === null ? '' : String(value).trim();
        }

        function toNumber(value) {
            const normalized = typeof value === 'string' ? value.replace(',', '.') : value;
            const n = Number(normalized);
            return Number.isFinite(n) ? n : 0;
        }

        function toBool(value) {
            if (typeof value === 'boolean') return value;
            if (typeof value === 'number') return value !== 0;
            const v = toText(value).toLowerCase();
            return ['true', '1', 'si', 'sí', 'yes', 'y'].includes(v);
        }

        function normalizeKey(key) {
            return key.toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '');
        }

        function normalizeStockRow(row) {
            return {
                id: pick(row, ['id', 'ID'], undefined),
                referencia: toText(pick(row, ['Product Code', 'referencia', 'Referencia', 'productcode', 'productCode', 'codigo', 'Código', 'Codigo'])),
                designacion: toText(pick(row, ['Product name', 'designacion', 'designación', 'Designacion', 'Designación', 'descripcion', 'Descripción', 'Descripcion', 'productname', 'productName'])),
                seccion: toText(pick(row, ['Department', 'seccion', 'sección', 'Seccion', 'Sección', 'department', 'departamento', 'Departamento'])),
                stockDisponible: toNumber(pick(row, ['Qty', 'stockDisponible', 'stockdisponible', 'stock_disponible', 'StockDisponible', 'Stock Disponible', 'Stock disponible', 'Stock_Disponible', 'qty', 'cantidad', 'Cantidad', 'stock', 'Stock'])),
                ubicaciones: toText(pick(row, ['Address', 'ubicaciones', 'Ubicaciones', 'address', 'ubicacion', 'ubicación', 'Ubicacion', 'Ubicación'])),
                tienda: toText(pick(row, ['Tienda', 'tienda', 'store', 'Store'])),
                sscc: toText(pick(row, ['SSCC', 'sscc'])),
                ean: toText(pick(row, ['EAN code', 'eancode', 'ean', 'EAN'])),
                _raw: row
            };
        }

        function detectStockMappingFromRows() {
            const rawRow = stockCache.map(item => item._raw).find(Boolean);
            if (!rawRow) return null;
            const keys = Object.keys(rawRow);
            const choose = (candidates) => candidates.find(key => keys.includes(key));
            const mapping = {
                name: 'stock: detectado desde datos existentes',
                id: choose(['id', 'ID']) || 'id',
                referencia: choose(['Product Code', 'referencia', 'Referencia']),
                designacion: choose(['Product name', 'designacion', 'designación', 'Designacion', 'Designación', 'descripcion', 'Descripción', 'Descripcion']),
                seccion: choose(['Department', 'seccion', 'sección', 'Seccion', 'Sección']),
                stockDisponible: choose(['Qty', 'stockDisponible', 'stockdisponible', 'stock_disponible', 'StockDisponible', 'Stock Disponible', 'Stock disponible', 'Stock_Disponible', 'stock', 'Stock', 'qty', 'cantidad', 'Cantidad']),
                ubicaciones: choose(['Address', 'ubicaciones', 'Ubicaciones', 'ubicacion', 'ubicación', 'Ubicacion', 'Ubicación', 'address']),
                tienda: choose(['Tienda', 'tienda', 'store', 'Store']),
                sscc: choose(['SSCC', 'sscc']),
                ean: choose(['EAN code', 'eancode', 'ean', 'EAN'])
            };
            return mapping.referencia && mapping.stockDisponible && mapping.tienda ? mapping : null;
        }

        function selectQueryForColumns(columns) {
            return `select=${columns.map(encodeURIComponent).join(',')}&limit=0`;
        }

        async function validateStockMapping(mapping) {
            const requiredColumns = [mapping.referencia, mapping.stockDisponible, mapping.tienda].filter(Boolean);
            const optionalColumns = [mapping.designacion, mapping.seccion, mapping.ubicaciones].filter(Boolean);
            const columns = [...new Set([...requiredColumns, ...optionalColumns])];
            await supabaseRequest(SUPABASE_CONFIG.stockTable, { query: selectQueryForColumns(columns) });
        }

        async function getWorkingStockMapping() {
            if (activeStockColumnMap) return activeStockColumnMap;
            const detected = detectStockMappingFromRows();
            const candidates = [detected, ...STOCK_COLUMN_MAPPINGS].filter(Boolean);
            const seen = new Set();
            const uniqueCandidates = candidates.filter(mapping => {
                const signature = [mapping.referencia, mapping.designacion, mapping.seccion, mapping.stockDisponible, mapping.ubicaciones, mapping.tienda].join('|');
                if (seen.has(signature)) return false;
                seen.add(signature);
                return true;
            });
            const errors = [];
            for (const mapping of uniqueCandidates) {
                try {
                    await validateStockMapping(mapping);
                    activeStockColumnMap = mapping;
                    return mapping;
                } catch (error) {
                    errors.push(`${mapping.name}: ${error.message}`);
                }
            }
            throw new Error(`No pude detectar las columnas de StockDispo. Según tu tabla deben ser Product Code, Product name, Department, Qty, Address y Tienda. Detalle: ${errors[0] || 'sin detalle'}`);
        }

        function normalizePedidoRow(row) {
            let lineas = pick(row, ['lineas', 'Lineas', 'líneas', 'LineasPedido'], []);
            if (typeof lineas === 'string') {
                try { lineas = JSON.parse(lineas); } catch (error) { lineas = []; }
            }
            if (!Array.isArray(lineas)) lineas = [];
            return {
                id: pick(row, ['id', 'ID'], undefined),
                ldap: toText(pick(row, ['ldap', 'LDAP'])),
                tienda: toText(pick(row, ['tienda', 'Tienda'])),
                cc: toText(pick(row, ['cc', 'CC'])),
                circuito: toText(pick(row, ['circuito', 'Circuito'])),
                fecha: pick(row, ['fecha', 'Fecha', 'created_at', 'createdAt'], new Date().toISOString()),
                lineas,
                impreso: toBool(pick(row, ['impreso', 'Impreso'], false)),
                preparado: toBool(pick(row, ['preparado', 'Preparado'], false)),
                _raw: row
            };
        }

        async function fetchStock() {
            const rows = await supabaseRequest(SUPABASE_CONFIG.stockTable, { query: 'select=*' });
            return Array.isArray(rows) ? rows.map(normalizeStockRow).filter(item => item.referencia) : [];
        }

        async function fetchPedidos() {
            const queries = ['select=*&order=Fecha.desc', 'select=*&order=fecha.desc', 'select=*'];
            let lastError = null;
            for (const query of queries) {
                try {
                    const rows = await supabaseRequest(SUPABASE_CONFIG.pedidosTable, { query });
                    return Array.isArray(rows) ? rows.map(normalizePedidoRow) : [];
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError;
        }

        async function cargarDatosSupabase() {
            setStatus('Conectando...', true);
            const errors = [];
            try {
                stockCache = await fetchStock();
            } catch (error) {
                console.error(error);
                errors.push(`StockDispo: ${error.message}`);
            }
            try {
                pedidosCache = await fetchPedidos();
            } catch (error) {
                console.error(error);
                errors.push(`PedidoMutuOfline: ${error.message}`);
            }
            if (errors.length) {
                setStatus(`Conexión parcial. Stock: ${stockCache.length}. Pedidos: ${pedidosCache.length}. ${errors.join(' | ')}`, false);
            } else {
                setStatus(`Conectado. Stock: ${stockCache.length} artículos. Pedidos: ${pedidosCache.length}.`, true);
            }
        }

        async function validatePedidoMapping(mapping) {
            const columns = [mapping.ldap, mapping.tienda, mapping.cc, mapping.circuito, mapping.fecha, mapping.lineas, mapping.impreso, mapping.preparado].filter(Boolean);
            await supabaseRequest(SUPABASE_CONFIG.pedidosTable, { query: selectQueryForColumns(columns) });
        }

        async function getWorkingPedidoMapping() {
            if (activePedidoColumnMap) return activePedidoColumnMap;
            const errors = [];
            for (const mapping of PEDIDO_COLUMN_MAPPINGS) {
                try {
                    await validatePedidoMapping(mapping);
                    activePedidoColumnMap = mapping;
                    return mapping;
                } catch (error) {
                    errors.push(`${mapping.name}: ${error.message}`);
                }
            }
            throw new Error(`No pude detectar las columnas de PedidoMutuOfline. Detalle: ${errors[0] || 'sin detalle'}`);
        }

        function pedidoToSupabaseRow(pedido, mapping) {
            const row = {};
            row[mapping.ldap] = pedido.ldap;
            row[mapping.tienda] = pedido.tienda;
            row[mapping.cc] = pedido.cc;
            row[mapping.circuito] = pedido.circuito;
            row[mapping.fecha] = pedido.fecha;
            row[mapping.lineas] = pedido.lineas;
            row[mapping.impreso] = pedido.impreso;
            row[mapping.preparado] = pedido.preparado;
            return row;
        }

        async function crearPedidoSupabase(pedido) {
            const mapping = await getWorkingPedidoMapping();
            const inserted = await supabaseRequest(SUPABASE_CONFIG.pedidosTable, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Prefer: 'return=representation' },
                body: pedidoToSupabaseRow(pedido, mapping)
            });
            return Array.isArray(inserted) && inserted.length ? normalizePedidoRow(inserted[0]) : normalizePedidoRow(pedido);
        }

        function addLine() {
            const tbody = document.querySelector('#lines-table tbody');
            const tr = document.createElement('tr');
            tr.classList.add('line-row');
            tr.innerHTML = `
                <td><input type="text" class="ref-input" placeholder="Referencia" /></td>
                <td class="designacion-cell"></td>
                <td class="seccion-cell"></td>
                <td><input type="number" class="cant-solicitada-input" min="1" value="1" /></td>
                <td class="cant-disponible-cell"></td>
                <td class="ubicaciones-cell"></td>
                <td><button type="button" class="delete-line-btn">Eliminar</button></td>
            `;
            tbody.appendChild(tr);
            const refInput = tr.querySelector('.ref-input');
            refInput.addEventListener('blur', () => buscarArticulo(refInput, tr));
            tr.querySelector('.delete-line-btn').addEventListener('click', () => tr.remove());
        }

        function sameText(a, b) {
            return toText(a).toLowerCase() === toText(b).toLowerCase();
        }

        function calcularReservado(referencia, tienda) {
            return pedidosCache.reduce((total, pedido) => {
                if (pedido.preparado || !sameText(pedido.tienda, tienda)) return total;
                return total + pedido.lineas.reduce((subtotal, linea) => {
                    return sameText(linea.referencia, referencia) ? subtotal + toNumber(linea.cantSolicitada) : subtotal;
                }, 0);
            }, 0);
        }

        async function buscarArticulo(refInput, row) {
            const referencia = refInput.value.trim();
            const tienda = document.getElementById('tienda').value.trim();
            const designacionCell = row.querySelector('.designacion-cell');
            const seccionCell = row.querySelector('.seccion-cell');
            const cantDisponibleCell = row.querySelector('.cant-disponible-cell');
            const ubicacionesCell = row.querySelector('.ubicaciones-cell');
            if (!referencia) {
                designacionCell.textContent = '';
                seccionCell.textContent = '';
                cantDisponibleCell.textContent = '';
                ubicacionesCell.textContent = '';
                return;
            }
            if (!tienda) {
                designacionCell.textContent = 'Selecciona tienda';
                seccionCell.textContent = '-';
                cantDisponibleCell.textContent = '0';
                ubicacionesCell.textContent = '';
                return;
            }
            if (!stockCache.length) await cargarDatosSupabase();
            const article = stockCache.find(item => sameText(item.referencia, referencia) && sameText(item.tienda, tienda));
            if (!article) {
                designacionCell.textContent = 'No encontrado';
                seccionCell.textContent = '-';
                cantDisponibleCell.textContent = '0';
                ubicacionesCell.textContent = '';
                return;
            }
            const reservado = calcularReservado(referencia, tienda);
            const disponible = Math.max(0, toNumber(article.stockDisponible) - reservado);
            designacionCell.textContent = article.designacion;
            seccionCell.textContent = article.seccion;
            cantDisponibleCell.textContent = disponible;
            ubicacionesCell.textContent = article.ubicaciones;
        }

        async function recalcularLineas() {
            const rows = Array.from(document.querySelectorAll('#lines-table tbody tr'));
            for (const row of rows) {
                const refInput = row.querySelector('.ref-input');
                if (refInput && refInput.value.trim()) await buscarArticulo(refInput, row);
            }
        }

        async function finalizarPedido() {
            const ldap = document.getElementById('ldap').value.trim();
            const tienda = document.getElementById('tienda').value.trim();
            const cc = document.getElementById('cc').value.trim();
            const circuito = document.getElementById('circuito').value;
            if (!ldap || !tienda || !cc || !circuito) {
                alert('Completa todos los campos de cabecera antes de finalizar.');
                return;
            }
            const tbody = document.querySelector('#lines-table tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            if (rows.length === 0) {
                alert('Añade al menos una línea al pedido.');
                return;
            }
            const lineas = [];
            for (const row of rows) {
                const ref = row.querySelector('.ref-input').value.trim();
                const designacion = row.querySelector('.designacion-cell').textContent.trim();
                const seccion = row.querySelector('.seccion-cell').textContent.trim();
                const cantSolicitada = toNumber(row.querySelector('.cant-solicitada-input').value);
                const cantDisponible = toNumber(row.querySelector('.cant-disponible-cell').textContent);
                const ubicaciones = row.querySelector('.ubicaciones-cell').textContent.trim();
                if (!ref) {
                    alert('Todas las líneas deben tener referencia.');
                    return;
                }
                if (cantSolicitada <= 0) {
                    alert('La cantidad solicitada debe ser mayor que cero.');
                    return;
                }
                if (designacion === 'No encontrado' || designacion === 'Selecciona tienda') {
                    alert(`La referencia ${ref} no está validada contra StockDispo.`);
                    return;
                }
                lineas.push({ referencia: ref, designacion, seccion, cantSolicitada, cantDisponible, ubicaciones });
            }
            const pedido = {
                ldap,
                tienda,
                cc,
                circuito,
                fecha: new Date().toISOString(),
                lineas,
                impreso: false,
                preparado: false
            };
            try {
                const finalizeBtn = document.getElementById('finalize-btn');
                finalizeBtn.disabled = true;
                finalizeBtn.textContent = 'Guardando...';
                const created = await crearPedidoSupabase(pedido);
                pedidosCache.unshift(created);
                alert('Pedido guardado correctamente en Supabase.');
                document.getElementById('ldap').value = '';
                document.getElementById('tienda').value = '';
                document.getElementById('cc').value = '';
                document.getElementById('circuito').value = '';
                tbody.innerHTML = '';
                setStatus(`Pedido creado. Pedidos en caché: ${pedidosCache.length}.`, true);
            } catch (error) {
                console.error(error);
                alert(`Error al guardar el pedido: ${error.message}`);
            } finally {
                const finalizeBtn = document.getElementById('finalize-btn');
                finalizeBtn.disabled = false;
                finalizeBtn.textContent = 'Finalizar pedido';
            }
        }

        function viewOrders() {
            window.open('ver_pedidos.html', '_blank');
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('refresh-data-btn').addEventListener('click', cargarDatosSupabase);
            document.getElementById('add-line-btn').addEventListener('click', addLine);
            document.getElementById('finalize-btn').addEventListener('click', finalizarPedido);
            document.getElementById('view-orders-btn').addEventListener('click', viewOrders);
            document.getElementById('tienda').addEventListener('change', recalcularLineas);
            cargarDatosSupabase();
            setInterval(cargarDatosSupabase, REFRESH_INTERVAL_MS);
        });
    </script>
</body>
