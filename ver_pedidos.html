<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos guardados</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        tbody tr:nth-child(odd) {
            background-color: #fafafa;
        }
        button {
            margin-right: 5px;
            padding: 6px 10px;
        }
        .details {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Pedidos guardados</h1>
    <p>A continuación se muestran los pedidos registrados en la base de datos.</p>
    <!-- Sección de filtros -->
    <div id="filter-section" style="margin: 10px 0;">
        <label for="filter-tienda">Tienda:</label>
        <select id="filter-tienda" style="margin-right:10px;">
            <option value="">Todas</option>
            <option value="T038">T038</option>
            <option value="T006">T006</option>
        </select>
        <label for="filter-cc">CC:</label>
        <input type="text" id="filter-cc" placeholder="Centro de coste" style="margin-right:10px;" />
        <label for="filter-circuito">Circuito:</label>
        <select id="filter-circuito" style="margin-right:10px;">
            <option value="">Todos</option>
            <option value="Transporte">Transporte</option>
            <option value="Retirada en Tienda">Retirada en Tienda</option>
            <option value="Retirada en LLS Palma">Retirada en LLS Palma</option>
        </select>
        <label for="filter-fecha">Fecha:</label>
        <input type="date" id="filter-fecha" style="margin-right:10px;" />
        <button type="button" id="apply-filters-btn">Aplicar filtros</button>
        <button type="button" id="export-filtered-btn">Exportar filtrados a Excel</button>
    </div>
    <table id="orders-table">
        <thead>
                <tr>
                    <th>ID</th>
                    <th>LDAP</th>
                    <th>Tienda</th>
                    <th>CC</th>
                    <th>Circuito</th>
                    <th>Fecha</th>
                    <th>Impreso</th>
                    <th>Preparado</th>
                    <th>Acciones</th>
                </tr>
        </thead>
        <tbody></tbody>
    </table>
    <!-- Librerías -->
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/dexie@3.0.3/dist/dexie.min.js"></script>
    <script>
        const db = new Dexie('stockDB');
        /*
         * Actualizamos la base de datos a la versión 3 para añadir los campos
         * "impreso" y "preparado" a la tabla2Pedidos. Esto permitirá marcar
         * si un pedido ya ha sido impreso/exportado y si está preparado y
         * ubicado. Es importante que las demás páginas (por ejemplo,
         * stock_pedidos.html) utilicen la misma versión y esquema para
         * evitar errores de incompatibilidad de Dexie.
         */
        db.version(3).stores({
            tabla1stock: '++id, referencia, tienda, designacion, seccion, stockDisponible, ubicaciones',
            // Añadimos impreso y preparado como campos no indexados para cada pedido
            tabla2Pedidos: '++id, ldap, tienda, cc, circuito, fecha, lineas, impreso, preparado'
        });

        // Configuración de JSONBin para almacenar datos en la nube
        const JSONBIN_CONFIG = {
            binId: '68e75f42ae596e708f0b76b0',
            apiKey: '$2a$10$XgjTeUIss3ymiETPPBZyWe40nSYcmT/WCdr8I9YgMGeiONYkisT7W'
        };

        /**
         * Obtiene los datos almacenados en la base remota de JSONBin. Devuelve un
         * objeto con las propiedades tabla1stock y tabla2Pedidos o un objeto
         * vacío si no existen. Si ocurre un error (p. ej. red), se captura y se
         * escribe en la consola.
         */
        async function fetchRemoteData() {
            const url = `https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.binId}/latest`;
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'X-Master-Key': JSONBIN_CONFIG.apiKey
                    }
                });
                if (!response.ok) throw new Error('Error al obtener datos remotos');
                const json = await response.json();
                return json.record || {};
            } catch (error) {
                console.error('No se pudo leer la base de datos remota:', error);
                return {};
            }
        }

        /**
         * Guarda los datos actuales de stock y pedidos en la base remota de JSONBin.
         * Recibe un objeto con las propiedades tabla1stock y tabla2Pedidos.
         */
        async function saveRemoteData(data) {
            const url = `https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.binId}`;
            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_CONFIG.apiKey,
                        'X-Bin-Versioning': 'false'
                    },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error('Error al guardar datos remotos');
            } catch (error) {
                console.error('No se pudo guardar en la base de datos remota:', error);
            }
        }

        /**
         * Sincroniza la base de datos local con la base remota al cargar la página.
         * Descarga las tablas remotas y sobrescribe las tablas locales. Si no hay
         * datos remotos, no realiza cambios.
         */
        async function initializeFromRemote() {
            const remote = await fetchRemoteData();
            try {
                if (remote.tabla1stock) {
                    await db.tabla1stock.clear();
                    await db.tabla1stock.bulkAdd(remote.tabla1stock);
                }
                if (remote.tabla2Pedidos) {
                    await db.tabla2Pedidos.clear();
                    await db.tabla2Pedidos.bulkAdd(remote.tabla2Pedidos);
                }
            } catch (err) {
                console.error('Error al sincronizar datos locales con la nube', err);
            }
        }

        /**
         * Renderiza una lista de pedidos en la tabla. Recibe un array de pedidos
         * previamente filtrado y crea la estructura de filas, incluyendo
         * checkboxes para "impreso" y "preparado" y botones de acciones.
         */
        function renderOrders(orders) {
            const tbody = document.querySelector('#orders-table tbody');
            tbody.innerHTML = '';
            orders.forEach(order => {
                const tr = document.createElement('tr');
                // Construir la fila principal con los datos básicos
                tr.innerHTML = `
                    <td>${order.id}</td>
                    <td>${order.ldap}</td>
                    <td>${order.tienda}</td>
                    <td>${order.cc}</td>
                    <td>${order.circuito}</td>
                    <td>${new Date(order.fecha).toLocaleString('es-ES')}</td>
                    <td style="text-align:center;"><input type="checkbox" class="impreso-checkbox" ${order.impreso ? 'checked' : ''} /></td>
                    <td style="text-align:center;"><input type="checkbox" class="preparado-checkbox" ${order.preparado ? 'checked' : ''} /></td>
                    <td>
                        <button type="button" class="details-btn">Detalles</button>
                        <button type="button" class="print-btn">Imprimir</button>
                        <button type="button" class="export-btn">Exportar Excel</button>
                    </td>
                `;
                tbody.appendChild(tr);
                // Fila para mostrar los detalles del pedido (líneas)
                const detailsRow = document.createElement('tr');
                detailsRow.style.display = 'none';
                const detailsCell = document.createElement('td');
                // El número de columnas debe coincidir con el encabezado (ID, LDAP, Tienda, CC, Circuito, Fecha, Impreso, Preparado, Acciones)
                detailsCell.colSpan = 9;
                detailsCell.classList.add('details');
                detailsRow.appendChild(detailsCell);
                tbody.appendChild(detailsRow);
                // Event handlers para expandir y contraer detalles
                tr.querySelector('.details-btn').addEventListener('click', () => {
                    if (detailsRow.style.display === 'none') {
                        detailsCell.innerHTML = generateDetailsTable(order);
                        detailsRow.style.display = '';
                    } else {
                        detailsRow.style.display = 'none';
                    }
                });
                // Checkbox de impreso: actualizar estado en base de datos al cambiar
                const impresoCheckbox = tr.querySelector('.impreso-checkbox');
                impresoCheckbox.addEventListener('change', async (e) => {
                    // Actualizar estado de impreso en la base local
                    await db.tabla2Pedidos.update(order.id, { impreso: e.target.checked });
                    // Sincronizar con la base remota
                    const [currentStock, currentOrders] = await Promise.all([
                        db.tabla1stock.toArray(),
                        db.tabla2Pedidos.toArray()
                    ]);
                    await saveRemoteData({ tabla1stock: currentStock, tabla2Pedidos: currentOrders });
                });
                // Checkbox de preparado: actualizar estado en base de datos al cambiar
                const preparadoCheckbox = tr.querySelector('.preparado-checkbox');
                preparadoCheckbox.addEventListener('change', async (e) => {
                    // Actualizar estado de preparado en la base local
                    await db.tabla2Pedidos.update(order.id, { preparado: e.target.checked });
                    // Sincronizar con la base remota
                    const [currentStock, currentOrders] = await Promise.all([
                        db.tabla1stock.toArray(),
                        db.tabla2Pedidos.toArray()
                    ]);
                    await saveRemoteData({ tabla1stock: currentStock, tabla2Pedidos: currentOrders });
                });
                // Exportar un pedido individual a Excel y marcar como impreso
                tr.querySelector('.export-btn').addEventListener('click', async () => {
                    exportOrderToExcel(order);
                    // Marcar como impreso
                    await db.tabla2Pedidos.update(order.id, { impreso: true });
                    // Actualizar el checkbox visualmente
                    impresoCheckbox.checked = true;
                    // Sincronizar con la base remota
                    const [currentStock, currentOrders] = await Promise.all([
                        db.tabla1stock.toArray(),
                        db.tabla2Pedidos.toArray()
                    ]);
                    await saveRemoteData({ tabla1stock: currentStock, tabla2Pedidos: currentOrders });
                });
                // Imprimir un pedido individual y marcar como impreso
                tr.querySelector('.print-btn').addEventListener('click', async () => {
                    printOrder(order);
                    await db.tabla2Pedidos.update(order.id, { impreso: true });
                    impresoCheckbox.checked = true;
                    // Sincronizar con la base remota
                    const [currentStock, currentOrders] = await Promise.all([
                        db.tabla1stock.toArray(),
                        db.tabla2Pedidos.toArray()
                    ]);
                    await saveRemoteData({ tabla1stock: currentStock, tabla2Pedidos: currentOrders });
                });
            });
        }

        /**
         * Aplica los filtros seleccionados en la interfaz y renderiza los pedidos
         * resultantes. Los filtros disponibles son: tienda, cc (cadena de texto
         * contenida), circuito y fecha exacta. Si un filtro está vacío, no se
         * aplica.
         */
        async function applyFilters() {
            const tiendaFilter = document.getElementById('filter-tienda').value;
            const ccFilter = document.getElementById('filter-cc').value.trim().toLowerCase();
            const circuitoFilter = document.getElementById('filter-circuito').value;
            const fechaFilter = document.getElementById('filter-fecha').value; // formato YYYY-MM-DD o ''
            const orders = await db.tabla2Pedidos.toArray();
            const filtered = orders.filter(order => {
                if (tiendaFilter && order.tienda !== tiendaFilter) return false;
                if (ccFilter && !order.cc.toLowerCase().includes(ccFilter)) return false;
                if (circuitoFilter && order.circuito !== circuitoFilter) return false;
                if (fechaFilter) {
                    const isoDate = new Date(order.fecha).toISOString().split('T')[0];
                    if (isoDate !== fechaFilter) return false;
                }
                return true;
            });
            renderOrders(filtered);
        }

        /**
         * Exporta los pedidos filtrados a un único archivo Excel. Cada fila
         * representará un pedido con sus datos básicos y estado de impreso y
         * preparado. El nombre del archivo se generará con la fecha actual.
         */
        async function exportFilteredOrders() {
            // Aplicamos filtros para obtener la lista actual
            const tiendaFilter = document.getElementById('filter-tienda').value;
            const ccFilter = document.getElementById('filter-cc').value.trim().toLowerCase();
            const circuitoFilter = document.getElementById('filter-circuito').value;
            const fechaFilter = document.getElementById('filter-fecha').value;
            const orders = await db.tabla2Pedidos.toArray();
            const filtered = orders.filter(order => {
                if (tiendaFilter && order.tienda !== tiendaFilter) return false;
                if (ccFilter && !order.cc.toLowerCase().includes(ccFilter)) return false;
                if (circuitoFilter && order.circuito !== circuitoFilter) return false;
                if (fechaFilter) {
                    const isoDate = new Date(order.fecha).toISOString().split('T')[0];
                    if (isoDate !== fechaFilter) return false;
                }
                return true;
            });
            // Construir datos para la hoja: encabezados y filas
            const wsData = [];
            wsData.push(['ID', 'LDAP', 'Tienda', 'CC', 'Circuito', 'Fecha', 'Impreso', 'Preparado']);
            filtered.forEach(order => {
                wsData.push([
                    order.id,
                    order.ldap,
                    order.tienda,
                    order.cc,
                    order.circuito,
                    new Date(order.fecha).toLocaleString('es-ES'),
                    order.impreso ? 'Sí' : 'No',
                    order.preparado ? 'Sí' : 'No'
                ]);
            });
            const worksheet = XLSX.utils.aoa_to_sheet(wsData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, 'PedidosFiltrados');
            const today = new Date();
            const fileName = `pedidos_filtrados_${today.toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(workbook, fileName);
            // Opcional: marcar todos los pedidos exportados como impreso
            await Promise.all(filtered.map(order => db.tabla2Pedidos.update(order.id, { impreso: true })));
            // Sincronizar todos los datos con la base remota
            const [currentStock, currentOrders] = await Promise.all([
                db.tabla1stock.toArray(),
                db.tabla2Pedidos.toArray()
            ]);
            await saveRemoteData({ tabla1stock: currentStock, tabla2Pedidos: currentOrders });
            // Volver a aplicar filtros para actualizar checkboxes
            applyFilters();
        }

        // Generar tabla con los detalles de un pedido
        function generateDetailsTable(order) {
            let html = '<table><thead><tr><th>Referencia</th><th>Designación</th><th>Sección</th><th>Cant. solicitada</th><th>Cant. disponible</th><th>Ubicaciones</th></tr></thead><tbody>';
            order.lineas.forEach(l => {
                html += `<tr><td>${l.referencia}</td><td>${l.designacion}</td><td>${l.seccion}</td><td>${l.cantSolicitada}</td><td>${l.cantDisponible}</td><td>${l.ubicaciones}</td></tr>`;
            });
            html += '</tbody></table>';
            return html;
        }

        // Exportar un pedido a un archivo Excel
        function exportOrderToExcel(order) {
            const wsData = [];
            // Encabezado del pedido
            wsData.push(['LDAP', order.ldap]);
            wsData.push(['Tienda', order.tienda]);
            wsData.push(['CC', order.cc]);
            wsData.push(['Circuito', order.circuito]);
            wsData.push(['Fecha', new Date(order.fecha).toLocaleString('es-ES')]);
            wsData.push([]); // fila en blanco
            // Encabezados de líneas
            wsData.push(['Referencia', 'Designación', 'Sección', 'Cant. solicitada', 'Cant. disponible', 'Ubicaciones']);
            order.lineas.forEach(l => {
                wsData.push([l.referencia, l.designacion, l.seccion, l.cantSolicitada, l.cantDisponible, l.ubicaciones]);
            });
            const worksheet = XLSX.utils.aoa_to_sheet(wsData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, 'Pedido');
            const fileName = `pedido_${order.id}.xlsx`;
            XLSX.writeFile(workbook, fileName);
        }

        // Imprimir pedido
        function printOrder(order) {
            const printWindow = window.open('', '_blank');
            const doc = printWindow.document;
            doc.write('<html><head><title>Imprimir Pedido</title>');
            doc.write('<style>table{width:100%;border-collapse:collapse;margin-top:10px;}th,td{border:1px solid #ccc;padding:8px;text-align:left;}th{background-color:#f2f2f2;}</style>');
            doc.write('</head><body>');
            doc.write(`<h2>Pedido #${order.id}</h2>`);
            doc.write('<h3>Cabecera</h3>');
            doc.write('<table><tbody>');
            doc.write(`<tr><td><strong>LDAP:</strong></td><td>${order.ldap}</td></tr>`);
            doc.write(`<tr><td><strong>Tienda:</strong></td><td>${order.tienda}</td></tr>`);
            doc.write(`<tr><td><strong>CC:</strong></td><td>${order.cc}</td></tr>`);
            doc.write(`<tr><td><strong>Circuito:</strong></td><td>${order.circuito}</td></tr>`);
            doc.write(`<tr><td><strong>Fecha:</strong></td><td>${new Date(order.fecha).toLocaleString('es-ES')}</td></tr>`);
            doc.write('</tbody></table>');
            doc.write('<h3>Líneas</h3>');
            doc.write(generateDetailsTable(order));
            doc.write('</body></html>');
            doc.close();
            printWindow.focus();
            printWindow.print();
            printWindow.close();
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Sincronizar la base de datos local con la remota antes de aplicar filtros
            initializeFromRemote().then(() => {
                // Cargar y renderizar pedidos utilizando los filtros actuales al inicio
                applyFilters();
            });
            // Asociar eventos a botones de filtro y exportación
            document.getElementById('apply-filters-btn').addEventListener('click', applyFilters);
            document.getElementById('export-filtered-btn').addEventListener('click', exportFilteredOrders);
        });
    </script>
</body>
</html>
